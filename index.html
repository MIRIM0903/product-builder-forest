<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한의학 MBTI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#111;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:500px;
    text-align:center;
}

h1{
    margin-bottom:20px;
    font-size:32px;
}

.subtitle{
    color:#aaa;
    margin-bottom:40px;
}

button{
    background:white;
    color:black;
    border:none;
    padding:15px 30px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
}

.question{
    display:none;
}

.answers{
    margin-top:20px;
}

.answer-btn{
    display:block;
    width:100%;
    margin:10px 0;
    background:#222;
    color:white;
    border:1px solid #333;
}

.result{
    display:none;
}

.result-card{
    background:#222;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div id="start">

<h1>🔥 한의학 MBTI</h1>

<p class="subtitle">
3분 만에 알아보는 나의 8체질
</p>

<button onclick="startTest()">
테스트 시작하기
</button>

</div>

<div id="question" class="question">

<h2 id="questionText"></h2>

<div class="answers" id="answers"></div>

</div>

<div id="result" class="result">

<h1>당신의 체질은</h1>

<div class="result-card">

<h2 id="resultTitle"></h2>

<p id="resultDesc"></p>

</div>

</div>

</div>

<script>

const questions = [

{
question:"평소 손발은?",
answers:[
"항상 따뜻하다",
"보통이다",
"차갑다"
]
},

{
question:"스트레스를 받으면?",
answers:[
"화를 낸다",
"소화가 안된다",
"잠이 많아진다"
]
},

{
question:"먹고 나면 자주 느끼는 것은?",
answers:[
"속이 편하다",
"속이 더부룩하다",
"졸리다"
]
}

];

let current = 0;
let score = 0;

function startTest(){

document.getElementById("start").style.display="none";
document.getElementById("question").style.display="block";

showQuestion();

}

function showQuestion(){

const q = questions[current];

document.getElementById("questionText").innerText=q.question;

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML="";

q.answers.forEach((answer,index)=>{

const btn=document.createElement("button");

btn.className="answer-btn";

btn.innerText=answer;

btn.onclick=()=>selectAnswer(index);

answersDiv.appendChild(btn);

});

}

function selectAnswer(index){

score += index;

current++;

if(current < questions.length){

showQuestion();

}else{

showResult();

}

}

function showResult(){

document.getElementById("question").style.display="none";

document.getElementById("result").style.display="block";

let type="";
let desc="";

if(score <= 2){

type="금양체질";

desc="추진력과 에너지가 강한 체질입니다.";

}

else if(score <= 4){

type="수음체질";

desc="섬세하고 차분한 성향의 체질입니다.";

}

else{

type="목음체질";

desc="신중하고 안정적인 성향의 체질입니다.";

}

document.getElementById("resultTitle").innerText=type;

document.getElementById("resultDesc").innerText=desc;

}

</script>

</body>
</html>
